<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        font-family: Arial;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .button {
        background-color: #4caf50;
        border: none;
        color: white;
        padding: 15px 32px;
        text-align: center;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin: 4px 2px;
        cursor: pointer;
      }

      .button-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }
    </style>
  </head>

  <body>
    <div class="button-container">
      <button class="button" onclick="fetch('/servo_up');">Servo Up</button>
      <button class="button" onclick="fetch('/servo_down');">Servo Down</button>
      <button class="button" onclick="fetch('/servo_left');">Servo Left</button>
      <button class="button" onclick="fetch('/servo_right');">
        Servo Right
      </button>
    </div>
    <br />
    <img src="/stream" alt="Live Stream" />
  </body>
</html>
